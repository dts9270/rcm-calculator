<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RCM नये भारत का निर्माण</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; font-family: "Poppins", "Baloo 2", sans-serif;
            background: linear-gradient(180deg, #FF9933, #FFFFFF, #138808, #FF9933);
            background-size: 100% 400%; animation: flowDown 12s linear infinite;
            background-attachment: fixed; color: #1e293b; overflow-x: hidden;
        }
        @keyframes flowDown { 0% { background-position: 0% 0%; } 100% { background-position: 0% 100%; } }

        .wrap { max-width: 1000px; margin: auto; padding: 8px; position: relative; }
        
        /* HEADER WITH FLAGS */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255, 255, 255, 0.9); padding: 10px; 
            border-radius: 12px; margin-bottom: 8px; backdrop-filter: blur(10px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .flag { font-size: 24px; animation: floatFlag 2s ease-in-out infinite alternate; }
        @keyframes floatFlag { from { transform: translateY(0); } to { transform: translateY(-5px); } }
        
        h1 { margin: 0; font-family: 'Baloo 2'; font-size: 18px; color: #0a5b99; text-align: center; flex: 1; }

        /* VOICE TOGGLE */
        #voiceToggle { background: #fff; border: 1px solid #ddd; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        .card { background: rgba(255,255,255,0.92); border-radius: 16px; padding: 12px; margin-bottom: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 8px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        input, select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; margin-bottom: 8px; }

        /* NEON POPUP */
        .savings-popup {
            position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
            background: #fff; border: 3px solid #39FF14; padding: 12px 25px;
            border-radius: 50px; box-shadow: 0 0 15px #39FF14, 0 10px 30px rgba(0,0,0,0.2);
            z-index: 10000; display: none; text-align: center;
        }
        .fade-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .fade-out { animation: popOut 0.8s ease-out forwards; }
        @keyframes popIn { 0% { opacity: 0; transform: translate(-50%, -20px); } 100% { opacity: 1; transform: translate(-50%, 0); } }
        @keyframes popOut { 0% { opacity: 1; transform: translate(-50%, 0); } 100% { opacity: 0; transform: translate(-50%, -50px); } }

        /* RESULT CARDS */
        .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .big-card { border-radius: 12px; padding: 8px; text-align: center; color: #fff; }
        .big-card .val { font-size: 22px; font-weight: 800; font-family: 'Baloo 2'; }
        .card-saving { background: linear-gradient(135deg, #0ea5e9, #2563eb); }
        .card-cons { background: linear-gradient(135deg, #9333ea, #7c3aed); }
        .card-year { background: linear-gradient(135deg, #16a34a, #15803d); }
        .card-life { background: linear-gradient(135deg, #FF9933, #e65100); }

        .pbtn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: 700; color: #fff; cursor: pointer; transition: 0.2s; }
        .wa { background: #128C7E; } .pdf { background: #334155; } .order { background: #FF9800; } .clear { background: #dc2626; }

        .prod-row { background: #fff; padding: 8px 10px; border-radius: 10px; margin-bottom: 5px; border-left: 4px solid #0a5b99; font-size: 13px; }
        .total-row { background: #0a5b99; color: #fff; padding: 10px; border-radius: 10px; margin-top: 5px; display: flex; justify-content: space-between; font-weight: 700; font-size: 14px; }

        /* PDF WATERMARK STYLE */
        #pdfWatermark {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 80px; color: rgba(0, 0, 0, 0.06);
            font-weight: 900; z-index: -1; white-space: nowrap;
        }
    </style>
</head>
<body>

<div id="savePopup" class="savings-popup">
    <span style="font-size: 13px; color: #333;">तुमची बचत:</span>
    <h2 id="saveAmount" style="margin:5px 0; color:#138808; font-size: 30px; font-family:'Baloo 2'">₹0</h2>
</div>

<div class="wrap" id="billContent">
    <div id="pdfWatermark">7020970727</div>
    <header>
        <div class="flag">🇮🇳</div>
        <h1>RCM नये भारत का निर्माण</h1>
        <div class="flag">🇮🇳</div>
        <button id="voiceToggle" title="आवाज चालू/बंद">🔊</button>
    </header>

    <div class="grid">
        <div class="card">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
                <input id="cName" placeholder="नाव">
                <input id="cId" placeholder="ID">
            </div>
            <select id="pSelect"></select>
            <div style="display:flex; gap:6px">
                <input id="qInput" type="number" value="1" min="1" style="flex:0.5; text-align:center">
                <button id="addBtn" class="pbtn" style="background:#0a5b99; flex:1.5;">+ जोडा</button>
            </div>
            <div id="pList" style="margin-top:10px; max-height:220px; overflow-y:auto"></div>
            <div id="totalSection"></div>
        </div>

        <div>
            <div class="cards">
                <div class="big-card card-saving"><span>मासिक बचत</span><div class="val" id="mSave">₹0</div></div>
                <div class="big-card card-cons"><span>कन्सिस्टन्सी</span><div class="val" id="cSave">₹0</div></div>
                <div class="big-card card-year"><span>वार्षिक बचत</span><div class="val" id="ySave">₹0</div></div>
                <div class="big-card card-life"><span>20 वर्षांचा फायदा</span><div class="val" id="lSave">₹0</div></div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:10px">
                <button id="waBtn" class="pbtn wa">📲 WhatsApp</button>
                <button id="pdfBtn" class="pbtn pdf">📄 PDF रिपोर्ट</button>
                <button id="orderBtn" class="pbtn order">🛒 Place Order</button>
                <button id="clearBtn" class="pbtn clear">🗑 Clear</button>
            </div>
        </div>
    </div>
    <footer style="text-align:center; padding:15px; font-size:12px; font-weight:800; color:#1e293b;">Designed by DS WORLD | 7020970727</footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
    const $ = (id) => document.getElementById(id);
    const fmt = (n) => Math.round(n).toLocaleString("en-IN");
    let products = [], order = JSON.parse(localStorage.getItem("rcm_order")) || [];
    let isVoiceOn = true;

    // VOICE TOGGLE
    $('voiceToggle').onclick = () => {
        isVoiceOn = !isVoiceOn;
        $('voiceToggle').innerText = isVoiceOn ? "🔊" : "🔇";
    };

    function speak(txt) {
        if (!isVoiceOn) return;
        let msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'mr-IN'; msg.rate = 0.95; window.speechSynthesis.speak(msg);
    }

    async function load(){
        const url = "https://docs.google.com/spreadsheets/d/1eR5THz-4AV3HkfnNJ5Un48ksz0I0jrepJSED3qHFg6k/gviz/tq?tqx=out:json";
        try {
            let r = await fetch(url); let t = await r.text();
            let j = JSON.parse(t.substring(47, t.length-2));
            products = j.table.rows.map(r => ({ name: r.c[0]?.v, mkt: +r.c[1]?.v, rcm: +r.c[2]?.v, pv: +r.c[3]?.v }));
            $('pSelect').innerHTML = '<option value="">-- प्रॉडक्ट निवडा --</option>' + products.map((p,i)=>`<option value="${i}">${p.name}</option>`).join('');
            update(); 
        } catch(e) { console.log("Load Error"); }
    }

    $('addBtn').onclick = () => {
        let idx = $('pSelect').value; if(!idx) return;
        let p = products[idx]; let qty = parseInt($('qInput').value) || 1;
        let bachat = (p.mkt - p.rcm) * qty;
        order.push({...p, qty});
        localStorage.setItem("rcm_order", JSON.stringify(order));
        speak(`अभिनंदन, ${bachat} रुपये बचत झाली`);
        showPopup(bachat); update();
    };

    function showPopup(amt){
        const pop = $('savePopup'); $('saveAmount').innerText = "₹" + fmt(amt);
        pop.style.display = 'block'; pop.classList.remove('fade-out'); pop.classList.add('fade-in');
        setTimeout(() => { pop.classList.replace('fade-in', 'fade-out'); setTimeout(() => { pop.style.display = 'none'; }, 800); }, 2000);
    }

    function update(){
        let tM=0, tR=0, tPV=0, tS=0;
        $('pList').innerHTML = order.map((it, i) => {
            let b = (it.mkt - it.rcm) * it.qty; tM += it.mkt*it.qty; tR += it.rcm*it.qty; tPV += it.pv*it.qty; tS += b;
            return `<div class="prod-row"><b>${i+1}. ${it.name} (x${it.qty})</b><br>
            <small>MRP: ₹${fmt(it.mkt*it.qty)} | RCM: ₹${fmt(it.rcm*it.qty)} | बचत: ₹${fmt(b)}</small></div>`;
        }).join('');
        if(order.length > 0) {
            $('totalSection').innerHTML = `<div class="total-row"><span>एकूण MRP: ₹${fmt(tM)}</span><span>एकूण RCM: ₹${fmt(tR)}</span></div>`;
        } else { $('totalSection').innerHTML = ""; }
        let cons = tPV < 1500 ? tPV*0.12 : tPV < 2500 ? 1500*0.1667 : 5000*0.1667;
        let m = tS + cons;
        $('mSave').innerText = "₹"+fmt(m); $('cSave').innerText = "₹"+fmt(cons);
        $('ySave').innerText = "₹"+fmt(m*12); $('lSave').innerText = "₹"+fmt(m*12*20);
    }

    $('pdfBtn').onclick = () => {
        if(!order.length) return alert("लिस्ट रिकामी आहे!");
        $('pdfWatermark').style.display = 'block';
        const element = $('billContent');
        html2pdf().from(element).set({
            margin: 5, filename: 'RCM_Bachat_Report.pdf',
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).save().then(() => { $('pdfWatermark').style.display = 'none'; });
    };

    $('orderBtn').onclick = () => {
        if(!order.length) return;
        let n = $('cName').value || "ग्राहक";
        let msg = `*नवीन RCM ऑर्डर*\nनाव: ${n}\n\n`;
        order.forEach((it, i) => msg += `${i+1}) ${it.name} - ${it.qty} नग\n`);
        window.open(`https://wa.me/7020970727?text=${encodeURIComponent(msg)}`);
    };

    $('waBtn').onclick = () => {
        let msg = `*RCM बचत रिपोर्ट*\nनाव: ${$('cName').value || "ग्राहक"}\nमासिक बचत: ${$('mSave').innerText}\n20 वर्षांचा फायदा: ${$('lSave').innerText}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    };

    $('clearBtn').onclick = () => { if(confirm("सर्व लिस्ट पुसायची का?")) { order=[]; localStorage.removeItem("rcm_order"); update(); } };
    load();
</script>
</body>
</html>
