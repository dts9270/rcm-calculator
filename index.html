<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DS WORLD – RCM Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* PERFECT TOP-DOWN TIRANGA ANIMATION */
        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            /* वरून खाली रंगांचा क्रम: नारंगी, पांढरा, हिरवा */
            background: linear-gradient(180deg, #FF9933 0%, #FFFFFF 50%, #138808 100%);
            background-size: 100% 300%; 
            animation: flowDown 6s linear infinite;
            background-attachment: fixed;
            color: #1e293b;
        }

        @keyframes flowDown {
            0% { background-position: 0% 0%; }
            100% { background-position: 0% 100%; }
        }

        /* WATERMARK STYLE (Only for PDF) */
        #watermark {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 80px;
            color: rgba(0, 0, 0, 0.05);
            font-weight: 800;
            z-index: -1;
            white-space: nowrap;
        }

        .wrap { max-width: 1000px; margin: auto; padding: 10px; position: relative; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; background: rgba(255, 255, 255, 0.75);
            padding: 8px 15px; border-radius: 15px; backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .logo { width: 45px; height: 45px; border-radius: 10px; background: #fff; display: flex; align-items: center; justify-content: center; }
        .logo img { width: 85%; }
        h1 { margin: 0; font-family: "Baloo 2"; color: #0a5b99; font-size: 20px; }

        .card {
            background: rgba(255, 255, 255, 0.9); border-radius: 20px;
            padding: 12px; border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1); margin-bottom: 10px;
        }

        .grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 10px; align-items: start; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        input, select { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; font-size: 13px; margin-bottom: 5px; box-sizing: border-box; }

        .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .big-card { border-radius: 15px; padding: 10px; text-align: center; color: #fff; box-shadow: 0 5px 12px rgba(0,0,0,0.1); }
        .big-card .val { font-size: 22px; font-weight: 800; }
        .big-card span { font-size: 10px; font-weight: 600; text-transform: uppercase; }

        .card-saving { background: linear-gradient(135deg, #0ea5e9, #2563eb); }
        .card-cons { background: linear-gradient(135deg, #9333ea, #7c3aed); }
        .card-year { background: linear-gradient(135deg, #16a34a, #15803d); }
        .card-life { background: linear-gradient(135deg, #FF9933, #e65100); }

        .bottom-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .pbtn { padding: 12px; border: none; border-radius: 10px; font-weight: 700; font-size: 13px; color: #fff; cursor: pointer; }
        .wa { background: #128C7E; } .pdf { background: #334155; } .order { background: #FF9800; } .clear { background: #dc2626; }

        footer { text-align: center; padding: 10px; font-size: 11px; font-weight: 800; color: #1e293b; }
    </style>
</head>
<body>

<div id="watermark">7020970727</div>

<div class="wrap" id="billContent">
    <header>
        <div style="display:flex; gap:10px; align-items:center">
            <div class="logo"><img src="logo.png" alt="RCM"></div>
            <h1>RCM Pro कॅल्क्युलेटर</h1>
        </div>
        <div id="visitorBox" style="font-size:11px; font-weight:700"></div>
    </header>

    <div class="grid">
        <div class="card">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
                <div><label style="font-size:10px">नाव</label><input id="custName" placeholder="नाव"></div>
                <div><label style="font-size:10px">ID</label><input id="rcmId" placeholder="ID"></div>
            </div>
            <div style="margin-top:5px">
                <select id="productSelect"></select>
                <div style="display:flex; gap:5px">
                    <input id="qtyInput" type="number" value="1" style="flex:1; text-align:center">
                    <button id="addBtn" class="pbtn" style="background:#0a5b99; flex:2">+ जोडा</button>
                </div>
            </div>
            <div id="productList" style="max-height: 150px; overflow-y:auto; margin-top:8px"></div>
        </div>

        <div>
            <div class="cards">
                <div class="big-card card-saving"><span>मासिक बचत</span><div class="val" id="cardMonthly">₹0</div></div>
                <div class="big-card card-cons"><span>कन्सिस्टन्सी</span><div class="val" id="cardCons">₹0</div></div>
                <div class="big-card card-year"><span>वार्षिक बचत</span><div class="val" id="cardAnnual">₹0</div></div>
                <div class="big-card card-life"><span>20 वर्षांचा फायदा</span><div class="val" id="cardTwenty">₹0</div></div>
            </div>

            <div class="card" style="margin-top:10px; padding:8px">
                <div style="display:flex; justify-content:space-around; text-align:center">
                    <div><small>Market</small><div id="totalMarket" style="font-weight:700">₹0</div></div>
                    <div><small>RCM</small><div id="totalRCM" style="font-weight:700; color:#0a5b99">₹0</div></div>
                    <div><small>PV</small><div id="totalPV" style="font-weight:700; color:#138808">0</div></div>
                </div>
            </div>

            <div class="bottom-actions">
                <button id="waBtn" class="pbtn wa">WhatsApp</button>
                <button id="pdfBtn" class="pbtn pdf">PDF</button>
                <button id="orderBtn" class="pbtn order">Order</button>
                <button id="clearBtn" class="pbtn clear">Clear</button>
            </div>
        </div>
    </div>
    <footer>Designed by DS WORLD | 7020970727</footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
<script>
    // तुमची आधीची सर्व लॉजिक फंक्शन्स (calc, add, etc.) इथे ठेवा.

    /* सुधारित PDF फंक्शन (वॉटरमार्कसह) */
    pdfBtn.onclick = () => {
        const wm = document.getElementById('watermark');
        wm.style.display = 'block'; // PDF साठी वॉटरमार्क दाखवा
        
        const element = document.getElementById('billContent');
        const opt = {
            margin: 10,
            filename: 'RCM_Bachat_Report.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save().then(() => {
            wm.style.display = 'none'; // डाऊनलोड झाल्यावर स्क्रीनवरून लपवा
        });
    };
</script>

</body>
</html>
