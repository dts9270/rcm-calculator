<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DS WORLD – RCM प्रो AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* तिरंगा बॅकग्राउंड अ‍ॅनिमेशन */
        body {
            margin: 0; font-family: "Poppins", "Baloo 2", sans-serif;
            background: linear-gradient(180deg, #FF9933, #FFFFFF, #138808, #FF9933);
            background-size: 100% 400%; animation: flowDown 12s linear infinite;
            background-attachment: fixed; color: #1e293b; overflow-x: hidden;
        }
        @keyframes flowDown { 0% { background-position: 0% 0%; } 100% { background-position: 0% 100%; } }

        .wrap { max-width: 1000px; margin: auto; padding: 8px; position: relative; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.85); padding: 8px 12px;
            border-radius: 12px; margin-bottom: 8px; backdrop-filter: blur(10px);
        }
        .logo { width: 40px; height: 40px; background: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .logo img { width: 80%; }

        h1, h2, h3, .val { font-family: 'Baloo 2', cursive; }

        .card { background: rgba(255,255,255,0.92); border-radius: 16px; padding: 12px; margin-bottom: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 8px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        label { font-size: 11px; font-weight: 700; color: #444; margin-left: 5px; }
        input, select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; margin-bottom: 8px; box-sizing: border-box; }

        /* बचत पॉपअप */
        .savings-popup {
            position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
            background: #fff; border: 2px solid #138808; padding: 15px 30px;
            border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 10000; display: none; text-align: center;
        }
        .fade-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .fade-out { animation: popOut 1s ease-out forwards; }

        @keyframes popIn { 0% { opacity: 0; transform: translate(-50%, -20px); } 100% { opacity: 1; transform: translate(-50%, 0); } }
        @keyframes popOut { 0% { opacity: 1; transform: translate(-50%, 0); } 100% { opacity: 0; transform: translate(-50%, -50px); } }

        /* निकाल कार्ड्स */
        .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .big-card { border-radius: 12px; padding: 10px; text-align: center; color: #fff; }
        .big-card .val { font-size: 24px; font-weight: 800; margin-top: -5px; }
        .big-card span { font-size: 10px; font-weight: 600; opacity: 0.9; }
        
        .card-saving { background: linear-gradient(135deg, #0ea5e9, #2563eb); }
        .card-cons { background: linear-gradient(135deg, #9333ea, #7c3aed); }
        .card-year { background: linear-gradient(135deg, #16a34a, #15803d); }
        .card-life { background: linear-gradient(135deg, #FF9933, #e65100); }

        .pbtn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: 700; color: #fff; cursor: pointer; font-size: 14px; }
        .wa { background: #128C7E; } .pdf { background: #334155; } .order { background: #FF9800; } .clear { background: #dc2626; }

        .prod-row { display: flex; align-items: center; gap: 8px; background: #fff; padding: 8px 12px; border-radius: 10px; margin-bottom: 5px; border-left: 4px solid #0a5b99; font-size: 13px; }
        .sno { background: #0a5b99; color: #fff; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; }

        /* इमोजी अ‍ॅनिमेशन */
        .emoji-float { position: fixed; bottom: -50px; font-size: 28px; z-index: 9999; pointer-events: none; animation: floatEmoji 3s linear forwards; }
        @keyframes floatEmoji { 0% { bottom: -50px; opacity: 1; transform: translateX(0); } 100% { bottom: 110vh; opacity: 0; transform: translateX(var(--randX)); } }

        /* PDF REPORT HIDDEN */
        #pdfReport { display: none; padding: 30px; background: #fff; color: #000; font-family: 'Poppins', 'Baloo 2', sans-serif; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .pdf-table th, .pdf-table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    </style>
</head>
<body>

<div id="savePopup" class="savings-popup">
    <span style="font-size: 13px; color: #666; font-weight: 600;">अभिनंदन! तुमची एकूण बचत:</span>
    <h2 id="saveAmount" style="margin:0; color:#138808; font-size: 30px;">₹0</h2>
    <span style="font-size: 20px;">🥳 ✨ 🎉</span>
</div>

<div class="wrap" id="mainApp">
    <header>
        <div style="display:flex; gap:10px; align-items:center">
            <div class="logo"><img src="logo.png"></div>
            <h1 style="margin:0; font-size:22px; color:#0a5b99">RCM प्रो AI</h1>
        </div>
        <div id="vBox" style="font-size:12px; font-weight:800; color:#138808"></div>
    </header>

    <div class="grid">
        <div class="card">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
                <div><label>नाव</label><input id="cName" placeholder="नाव लिहा"></div>
                <div><label>ID</label><input id="cId" placeholder="ID लिहा"></div>
            </div>
            <label>प्रॉडक्ट निवडा</label>
            <select id="pSelect"></select>
            <div style="display:flex; gap:8px">
                <div style="flex:0.5"><label>नग</label><input id="qInput" type="number" value="1" min="1" style="text-align:center"></div>
                <div style="flex:1.5"><label>&nbsp;</label><button id="addBtn" class="pbtn" style="background:#0a5b99; margin-top:0">+ जोडा</button></div>
            </div>
            <div id="pList" style="margin-top:10px; max-height:180px; overflow-y:auto"></div>
        </div>

        <div>
            <div class="cards">
                <div class="big-card card-saving"><span>मासिक बचत</span><div class="val" id="mSave">₹0</div></div>
                <div class="big-card card-cons"><span>कन्सिस्टन्सी</span><div class="val" id="cSave">₹0</div></div>
                <div class="big-card card-year"><span>वार्षिक बचत</span><div class="val" id="ySave">₹0</div></div>
                <div class="big-card card-life"><span>२० वर्षांचा फायदा</span><div class="val" id="lSave">₹0</div></div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:10px">
                <button id="pdfBtn" class="pbtn pdf">📄 AI रिपोर्ट PDF</button>
                <button id="waBtn" class="pbtn wa">📲 WhatsApp</button>
                <button id="clearBtn" class="pbtn clear" style="grid-column: span 2;">🗑 सर्व लिस्ट साफ करा</button>
            </div>
        </div>
    </div>
    <footer style="text-align:center; padding:15px; font-size:12px; font-weight:800; color:#1e293b;">Designed by DS WORLD | 7020970727</footer>
</div>

<div id="pdfReport">
    <div style="border-bottom: 3px solid #FF9933; padding-bottom: 10px; display: flex; justify-content: space-between;">
        <div><h2 style="color:#FF9933; margin:0">RCM स्मार्ट बचत अहवाल</h2><p>DS WORLD AI विश्लेषण</p></div>
        <div style="text-align:right"><h3 id="pdfN"></h3><p id="pdfD"></p></div>
    </div>
    <table class="pdf-table">
        <thead><tr><th>अ.क्र.</th><th>प्रॉडक्ट</th><th>नग</th><th>बचत (₹)</th></tr></thead>
        <tbody id="pdfBody"></tbody>
    </table>
    <div style="background:#f0f4ff; border-left:5px solid #2563eb; padding:15px; margin-top:20px; border-radius:8px;">
        <h4>🤖 AI विश्लेषण:</h4>
        <p id="aiTxt"></p>
    </div>
    <div style="margin-top:40px; text-align:center; font-size:12px; color:#666;">संपर्क: 7020970727 | वॉटरमार्क: 7020970727</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
    const $ = (id) => document.getElementById(id);
    const fmt = (n) => Math.round(n).toLocaleString("en-IN");
    let products = [], order = JSON.parse(localStorage.getItem("rcm_order")) || [];

    async function load(){
        const url = "https://docs.google.com/spreadsheets/d/1eR5THz-4AV3HkfnNJ5Un48ksz0I0jrepJSED3qHFg6k/gviz/tq?tqx=out:json";
        try {
            let r = await fetch(url); let t = await r.text();
            let j = JSON.parse(t.substring(47, t.length-2));
            products = j.table.rows.map(r => ({ name: r.c[0]?.v, mkt: +r.c[1]?.v, rcm: +r.c[2]?.v, pv: +r.c[3]?.v }));
            $('pSelect').innerHTML = '<option value="">-- निवडा --</option>' + products.map((p,i)=>`<option value="${i}">${p.name}</option>`).join('');
            update(); 
        } catch(e) { console.log("Error loading sheet"); }
    }

    $('addBtn').onclick = () => {
        let idx = $('pSelect').value; if(!idx) return;
        let p = products[idx]; let qty = parseInt($('qInput').value) || 1;
        let bachat = (p.mkt - p.rcm) * qty;

        let ex = order.find(o => o.name === p.name);
        if(ex) ex.qty += qty; else order.push({...p, qty});

        localStorage.setItem("rcm_order", JSON.stringify(order));
        showCelebration();
        showPopup(bachat);
        update();
    };

    function showPopup(amt){
        const pop = $('savePopup');
        $('saveAmount').innerText = "₹" + fmt(amt);
        pop.style.display = 'block';
        pop.classList.remove('fade-out'); pop.classList.add('fade-in');
        setTimeout(() => {
            pop.classList.replace('fade-in', 'fade-out');
            setTimeout(() => { pop.style.display = 'none'; }, 1000);
        }, 3000);
    }

    function showCelebration(){
        const emojis = ['🎉', '🥳', '💰', '✨'];
        for(let i=0; i<12; i++){
            setTimeout(() => {
                const el = document.createElement('div'); el.className = 'emoji-float';
                el.innerText = emojis[Math.floor(Math.random()*emojis.length)];
                el.style.left = Math.random()*100 + 'vw';
                el.style.setProperty('--randX', (Math.random()*200 - 100) + 'px');
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 3000);
            }, i * 150);
        }
    }

    function update(){
        let tM=0, tR=0, tPV=0, tS=0;
        $('pList').innerHTML = order.map((it, i) => {
            tM += it.mkt*it.qty; tR += it.rcm*it.qty; tPV += it.pv*it.qty; tS += (it.mkt-it.rcm)*it.qty;
            return `<div class="prod-row"><span class="sno">${i+1}</span><span style="flex:1">${it.name} (x${it.qty})</span><b>₹${fmt((it.mkt-it.rcm)*it.qty)}</b></div>`;
        }).join('');

        let cons = tPV < 1500 ? tPV*0.12 : tPV < 2500 ? 1500*0.1667 : 5000*0.1667;
        let m = tS + cons;
        $('mSave').innerText = "₹"+fmt(m); $('cSave').innerText = "₹"+fmt(cons);
        $('ySave').innerText = "₹"+fmt(m*12); $('lSave').innerText = "₹"+fmt(m*12*20);
    }

    $('pdfBtn').onclick = () => {
        if(!order.length) return alert("लिस्ट रिकामी आहे!");
        $('pdfN').innerText = "नाव: " + ($('cName').value || "सन्माननीय ग्राहक");
        $('pdfD').innerText = "तारीख: " + new Date().toLocaleDateString('mr-IN');
        $('pdfBody').innerHTML = order.map((it, i) => `<tr><td>${i+1}</td><td>${it.name}</td><td>${it.qty}</td><td>₹${fmt((it.mkt-it.rcm)*it.qty)}</td></tr>`).join('');
        $('aiTxt').innerHTML = `तुमच्या या स्मार्ट खरेदीमुळे तुम्ही वर्षाला <b>${$('ySave').innerText}</b> वाचवत आहात. २० वर्षात ही रक्कम <b>${$('lSave').innerText}</b> होईल! ही फक्त बचत नाही, तर तुमच्या कुटुंबाचे भविष्य सुरक्षित करणारी गुंतवणूक आहे.`;
        
        const rep = $('pdfReport'); rep.style.display = 'block';
        html2pdf().from(rep).set({ 
            margin: 10, filename: 'RCM_Bachat_Report.pdf', 
            html2canvas: { scale: 2 }, 
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
        }).save().then(()=> rep.style.display='none');
    };

    $('waBtn').onclick = () => {
        let m = `*RCM स्मार्ट बचत अहवाल*\nनाव: ${$('cName').value}\nमासिक बचत: ${$('mSave').innerText}\n२० वर्षांचा फायदा: ${$('lSave').innerText}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(m)}`);
    };

    $('clearBtn').onclick = () => { if(confirm("सर्व डेटा पुसायचा का?")) { order=[]; localStorage.removeItem("rcm_order"); update(); } };

    load();
</script>
</body>
</html>
