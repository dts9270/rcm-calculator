<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DS WORLD – RCM Pro Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* FULL SCREEN TOP-DOWN TIRANGA ANIMATION */
        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: linear-gradient(180deg, #FF9933, #FFFFFF, #138808, #FF9933);
            background-size: 100% 400%;
            animation: flowDown 8s linear infinite;
            background-attachment: fixed;
            color: #1e293b;
            overflow-x: hidden;
        }

        @keyframes flowDown {
            0% { background-position: 0% 0%; }
            100% { background-position: 0% 100%; }
        }

        /* WATERMARK FOR PDF */
        #watermark {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 60px;
            color: rgba(0, 0, 0, 0.05);
            font-weight: 800;
            z-index: -1;
            white-space: nowrap;
        }

        .wrap { max-width: 1000px; margin: auto; padding: 10px; position: relative; }

        /* COMPACT GLASS UI */
        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; background: rgba(255, 255, 255, 0.8);
            padding: 8px 15px; border-radius: 15px; backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .logo { width: 45px; height: 45px; border-radius: 10px; background: #fff; display: flex; align-items: center; justify-content: center; }
        .logo img { width: 85%; }
        h1 { margin: 0; font-family: "Baloo 2"; color: #0a5b99; font-size: 18px; }

        .card {
            background: rgba(255, 255, 255, 0.9); border-radius: 18px;
            padding: 12px; border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1); margin-bottom: 10px;
        }

        .grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 10px; align-items: start; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        label { font-size: 10px; font-weight: 700; color: #444; text-transform: uppercase; margin-left: 2px; }
        input, select { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; font-size: 13px; margin-bottom: 5px; box-sizing: border-box; }

        /* RESULT CARDS */
        .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .big-card { border-radius: 15px; padding: 10px; text-align: center; color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .big-card .val { font-size: 22px; font-weight: 800; line-height: 1.1; }
        .big-card span { font-size: 9px; font-weight: 600; text-transform: uppercase; }

        .card-saving { background: linear-gradient(135deg, #0ea5e9, #2563eb); }
        .card-cons { background: linear-gradient(135deg, #9333ea, #7c3aed); }
        .card-year { background: linear-gradient(135deg, #16a34a, #15803d); }
        .card-life { background: linear-gradient(135deg, #FF9933, #e65100); }

        /* BUTTONS */
        .bottom-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .pbtn { padding: 12px; border: none; border-radius: 10px; font-weight: 700; font-size: 13px; color: #fff; cursor: pointer; transition: 0.2s; }
        .pbtn:active { transform: scale(0.95); }
        .wa { background: #128C7E; } .pdf { background: #334155; } .order { background: #FF9800; } .clear { background: #dc2626; }

        /* LIST ITEM */
        .list-item { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 6px 10px; border-radius: 8px; margin-bottom: 4px; border-left: 3px solid #0ea5e9; font-size: 12px; }

        footer { text-align: center; padding: 10px; font-size: 11px; font-weight: 800; color: #1e293b; }
    </style>
</head>
<body>

<div id="watermark">7020970727</div>

<div class="wrap" id="billArea">
    <header>
        <div style="display:flex; gap:8px; align-items:center">
            <div class="logo"><img src="logo.png" alt="RCM"></div>
            <h1>RCM Pro कॅल्क्युलेटर</h1>
        </div>
        <div id="visitorBox" style="font-size:11px; font-weight:700; color:#138808"></div>
    </header>

    <div class="grid">
        <div class="card">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
                <div><label>नाव</label><input id="custName" placeholder="नाव"></div>
                <div><label>RCM ID</label><input id="rcmId" placeholder="ID"></div>
            </div>
            <div style="margin-top:5px">
                <label>प्रॉडक्ट निवडा</label>
                <select id="productSelect"></select>
                <div style="display:flex; gap:5px">
                    <input id="qtyInput" type="number" value="1" min="1" style="flex:0.6; text-align:center">
                    <button id="addBtn" class="pbtn" style="background:#0a5b99; flex:2">+ ADD</button>
                </div>
            </div>
            <div id="productList" style="max-height: 160px; overflow-y:auto; margin-top:8px"></div>
        </div>

        <div>
            <div class="cards">
                <div class="big-card card-saving"><span>मासिक बचत</span><div class="val" id="cardMonthly">₹0</div></div>
                <div class="big-card card-cons"><span>कन्सिस्टन्सी</span><div class="val" id="cardCons">₹0</div></div>
                <div class="big-card card-year"><span>वार्षिक बचत</span><div class="val" id="cardAnnual">₹0</div></div>
                <div class="big-card card-life"><span>20 वर्षांचा फायदा</span><div class="val" id="cardTwenty">₹0</div></div>
            </div>

            <div class="card" style="margin-top:10px; padding:10px">
                <div style="display:flex; justify-content:space-around; text-align:center">
                    <div><small>Market</small><div id="totalMarket" style="font-weight:700">₹0</div></div>
                    <div><small>RCM</small><div id="totalRCM" style="font-weight:700; color:#0a5b99">₹0</div></div>
                    <div><small>Total PV</small><div id="totalPV" style="font-weight:700; color:#138808">0</div></div>
                </div>
            </div>

            <div class="bottom-actions">
                <button id="waBtn" class="pbtn wa">WhatsApp</button>
                <button id="pdfBtn" class="pbtn pdf">Download PDF</button>
                <button id="orderBtn" class="pbtn order">Place Order</button>
                <button id="clearBtn" class="pbtn clear">Clear All</button>
            </div>
        </div>
    </div>
    <footer>Designed by DS WORLD | 7020970727</footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
<script>
    function $(id){return document.getElementById(id);}
    function fmt(n){return Math.round(n).toLocaleString("en-IN");}

    let products = [];
    let order = [];

    /* 1. GOOGLE SHEET LOADING */
    const SHEET_ID = "1eR5THz-4AV3HkfnNJ5Un48ksz0I0jrepJSED3qHFg6k";
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    async function loadProducts(){
        try {
            let r = await fetch(SHEET_URL);
            let t = await r.text();
            let j = JSON.parse(t.substring(47, t.length - 2));
            products = j.table.rows.map(r => ({
                name: r.c[0]?.v || "",
                market: +r.c[1]?.v || 0,
                rcm: +r.c[2]?.v || 0,
                pv: +r.c[3]?.v || 0
            }));
            fillSelect();
        } catch (e) {
            console.error("Sheet Error", e);
            products = [{name: "No Data Found", market: 0, rcm: 0, pv: 0}];
            fillSelect();
        }
    }

    function fillSelect(){
        $('productSelect').innerHTML = '<option value="">-- निवडा --</option>';
        products.forEach((p, i) => {
            let o = document.createElement("option");
            o.value = i; o.textContent = p.name;
            $('productSelect').appendChild(o);
        });
    }

    /* 2. LOGIC */
    $('addBtn').onclick = () => {
        let idx = $('productSelect').value;
        if(idx === "") return alert("Product निवडा!");
        let qty = parseInt($('qtyInput').value) || 1;
        let p = products[idx];
        let ex = order.find(o => o.name === p.name);
        if(ex) ex.qty += qty; else order.push({...p, qty});
        calc();
    };

    function calc(){
        $('productList').innerHTML = "";
        let tM=0, tR=0, tPV=0, tS=0;
        order.forEach((it, i) => {
            tM += it.market * it.qty; tR += it.rcm * it.qty;
            tPV += it.pv * it.qty; tS += (it.market - it.rcm) * it.qty;
            let div = document.createElement("div");
            div.className = "list-item";
            div.innerHTML = `<div><b>${it.name}</b><br><small>Qty: ${it.qty}</small></div><b>₹${fmt((it.market-it.rcm)*it.qty)}</b>`;
            $('productList').appendChild(div);
        });

        $('totalMarket').innerText = "₹" + fmt(tM);
        $('totalRCM').innerText = "₹" + fmt(tR);
        $('totalPV').innerText = fmt(tPV);

        let cons = tPV < 1500 ? tPV*0.12 : tPV < 2500 ? 1500*0.1667 : 5000*0.1667;
        let monthly = tS + cons;
        $('cardMonthly').innerText = "₹" + fmt(monthly);
        $('cardCons').innerText = "₹" + fmt(cons);
        $('cardAnnual').innerText = "₹" + fmt(monthly * 12);
        $('cardTwenty').innerText = "₹" + fmt(monthly * 12 * 20);
    }

    /* 3. PDF WITH WATERMARK */
    $('pdfBtn').onclick = () => {
        $('watermark').style.display = 'block';
        const element = $('billArea');
        html2pdf().from(element).set({
            margin: 5, filename: 'RCM_Report.pdf',
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).save().then(() => { $('watermark').style.display = 'none'; });
    };

    /* 4. OTHER ACTIONS */
    $('waBtn').onclick = () => {
        let msg = `*RCM बचत रिपोर्ट*\nPV: ${$('totalPV').innerText}\nमासिक बचत: ${$('cardMonthly').innerText}`;
        window.open("https://wa.me/?text=" + encodeURIComponent(msg));
    };

    $('clearBtn').onclick = () => { if(confirm("Clear करायचे?")) { order = []; calc(); } };

    // Visit Counter
    let v = localStorage.getItem("rcm_v") || 0; v++;
    localStorage.setItem("rcm_v", v);
    $('visitorBox').innerText = "भेटी: " + v;

    loadProducts();
</script>
</body>
</html>
